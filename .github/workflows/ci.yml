name: NEXUS CI

on:
  push:
    branches: ["main", "shrishti-work"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: |
          rc=0
          uv run pytest > pytest_output.log 2>&1 || rc=$?
          if [ $rc -ne 0 ]; then
            echo "Pytest failed with exit code $rc. Committing output log..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pytest_output.log
            git commit -m "ci: save pytest failure log [skip ci]"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
            exit $rc
          fi

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
